<div class="card-reloj incienso-theme">
  <div class="card-header">
    <span class="epoca">Dinastía Song (~Siglo VI)</span>
    <h3>Senda de Incienso Aromático</h3>
  </div>
  <div class="altar-container">
    <div class="soporte-madera">
      <div class="varilla-incienso" [ngStyle]="{'width': (100 - (hora.getMinutes() * 1.66)) + '%'}"></div>
      <div class="punto-brasa" [ngStyle]="{'left': (100 - (hora.getMinutes() * 1.66)) + '%'}">
        <div class="humo-sutil"></div>
      </div>
    </div>
    <div class="marcas-oro">
      <span>⌛ 00m</span><span>⏳ 30m</span><span>⌛ 60m</span>
    </div>
  </div>
  <div class="card-footer"><p class="status-text">Combustión controlada por resinas naturales</p></div>
</div>
