<div class="card-reloj pendulo-theme">
  <div class="card-header">
    <span class="epoca">Revolución Científica (~1656)</span>
    <h3>Reloj de Péndulo Clásico</h3>
  </div>
  <div class="reloj-mecanico-body">
    <div class="esfera-blanca">
      <div class="aguja hora" [ngStyle]="{'transform': 'rotate(' + (hora.getHours() * 30 + hora.getMinutes() * 0.5) + 'deg)'}"></div>
      <div class="aguja minuto" [ngStyle]="{'transform': 'rotate(' + (hora.getMinutes() * 6) + 'deg)'}"></div>
      <div class="centro-perno"></div>
    </div>
    
    <div class="caja-oscilacion">
      <div class="pendulo-brazo" 
           [ngStyle]="{'--rotation': (12 * Math.sin(hora.getTime() / 200)) + 'deg'}">
        <div class="lenteja-oro"></div>
      </div>
    </div>
  </div>
  <div class="card-footer">
    <p class="status-text">Mecánica de escape sincronizada</p>
  </div>
</div>
