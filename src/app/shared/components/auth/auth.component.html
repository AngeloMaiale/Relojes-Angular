<div class="auth-wrapper">
  <div class="auth-card">
    <h2>{{ isLoginMode ? 'Iniciar Sesión' : 'Crear Cuenta' }}</h2>
    <p>{{ isLoginMode ? 'Accede al laboratorio cronológico' : 'Regístrate para desbloquear la línea de tiempo' }}</p>

    <div class="error-box" *ngIf="errorMensaje">{{ errorMensaje }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group" *ngIf="!isLoginMode">
        <label>Nombre de Usuario</label>
        <input type="text" [(ngModel)]="username" name="username" placeholder="Angelo">
      </div>

      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="tu@ingenieria.com">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••">
      </div>

      <button type="submit" class="btn-submit">
        {{ isLoginMode ? 'Ingresar' : 'Registrarme' }}
      </button>
    </form>

    <span class="toggle-text" (click)="toggleMode()">
      {{ isLoginMode ? '¿No tienes cuenta? Regístrate aquí' : '¿Ya tienes cuenta? Inicia sesión' }}
    </span>
  </div>
</div>
